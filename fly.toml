# Fly.io deployment — create the volume before first deploy:
#   fly volumes create collab_data --size 1 --region <your-region>
#   fly secrets set SESSION_SECRET="$(openssl rand -hex 32)" COOKIE_SECURE=true
#   fly deploy

app = 'collab-editor'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '8080'
  DATABASE_PATH = '/data/collab.db'
  STATIC_DIR = '/app/static'
  COOKIE_SECURE = 'true'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '15s'
    timeout = '2s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[mounts]
  source = 'collab_data'
  destination = '/data'

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
